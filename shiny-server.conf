# ============================================================================
# Shiny Server Configuration
# ============================================================================
# Location: /etc/shiny-server/shiny-server.conf
# Serves R and Python Shiny apps from /srv/shiny-server/
# Updated: 2026-03-06
#
# APP TYPES:
#   R Apps:      bowtie_app, EcoNeTool, marinesabres, naturejust, traits
#   Python Apps: AQUABC, BEACH4M, cenjas, cenop, giselect, marxan,
#                osmose, pypath, shyfem, shyfem-ui, telemac
#
# IMPORTANT: R apps use default behavior (no python directive)
#            Python apps require explicit python directive
# ============================================================================

run_as shiny;
log_dir /var/log/shiny-server;

server {
  listen 3838 127.0.0.1;

  # ==========================================================================
  # R SHINY APPS (no python directive needed)
  # ==========================================================================

  location /bowtie_app {
    app_dir /srv/shiny-server/bowtie_app;
    log_dir /var/log/shiny-server;
  }

  location /EcoNeTool {
    app_dir /srv/shiny-server/EcoNeTool;
    log_dir /var/log/shiny-server;
  }

  location /marinesabres {
    app_dir /srv/shiny-server/marinesabres;
    log_dir /var/log/shiny-server;
  }

  location /naturejust {
    app_dir /srv/shiny-server/naturejust;
    log_dir /var/log/shiny-server;
  }

  location /traits {
    app_dir /srv/shiny-server/traits;
    log_dir /var/log/shiny-server;
  }

  # ==========================================================================
  # PYTHON SHINY APPS (require python directive)
  # ==========================================================================

  location /AQUABC {
    app_dir /srv/shiny-server/AQUABC;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /BEACH4M {
    app_dir /srv/shiny-server/BEACH4M;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /cenjas {
    app_dir /srv/shiny-server/cenjas;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /cenop {
    app_dir /srv/shiny-server/cenop;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /giselect {
    app_dir /srv/shiny-server/giselect;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /marxan {
    app_dir /srv/shiny-server/marxan;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /osmose {
    app_dir /srv/shiny-server/osmose;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /pypath {
    app_dir /srv/shiny-server/pypath;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /shyfem {
    app_dir /srv/shiny-server/shyfem;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /shyfem-ui {
    app_dir /srv/shiny-server/shyfem-ui;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  location /telemac {
    app_dir /srv/shiny-server/telemac;
    python /opt/micromamba/envs/shiny/bin/python3;
    log_dir /var/log/shiny-server;
  }

  # ==========================================================================
  # DEFAULT FALLBACK (for index and any unlisted R apps)
  # ==========================================================================
  # NOTE: No python directive here - defaults to R
  # This serves the welcome page and any R apps not explicitly listed above

  location / {
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;
    directory_index on;
  }
}
